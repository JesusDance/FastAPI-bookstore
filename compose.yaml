    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://neondb_owner:npg_r1qvdo2ehkHj@ep-jolly-moon-alg0l9z0-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
      JWT_SECRET_KEY: "hq41muncLqsPg698VCJHkBSQZcH9ChgZ3FSFE6jKky-iKoI6OxJVCq-1N2tJgE2kfrQ"
      ALGORITHM: "HS256"
  db:
